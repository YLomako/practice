<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firewall DNS Alerts</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: #0f172a;
            color: #e2e8f0;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .subtitle {
            color: #94a3b8;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: #1e293b;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #334155;
        }
        
        .stat-label {
            color: #94a3b8;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }
        
        .stat-value {
            font-size: 2.5rem;
            font-weight: bold;
            color: #60a5fa;
        }
        
        .filters {
            background: #1e293b;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #334155;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .filter-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .filter-group label {
            color: #94a3b8;
            font-size: 0.9rem;
        }
        
        select, input {
            background: #0f172a;
            border: 1px solid #334155;
            color: #e2e8f0;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.9rem;
        }
        
        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        
        .refresh-btn {
            background: #10b981;
            margin-left: auto;
        }
        
        /* КОМПАКТНАЯ ТАБЛИЦА БЕЗ СКРОЛЛА */
        table {
            width: 100%;
            border-collapse: collapse;
            background: #1e293b;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #334155;
            table-layout: fixed;
        }
        
        th {
            background: #0f172a;
            color: #94a3b8;
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 12px 8px;
            text-align: left;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        td {
            padding: 12px 8px;
            border-bottom: 1px solid #334155;
            color: #e2e8f0;
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        tr:hover td {
            background: #2d3b4f;
        }
        
        /* Ширина колонок в процентах */
        th:nth-child(1), td:nth-child(1) { width: 15%; } /* Время */
        th:nth-child(2), td:nth-child(2) { width: 10%; } /* IP */
        th:nth-child(3), td:nth-child(3) { width: 25%; } /* Домен */
        th:nth-child(4), td:nth-child(4) { width: 8%; }  /* Серьезность */
        th:nth-child(5), td:nth-child(5) { width: 10%; } /* Причина */
        th:nth-child(6), td:nth-child(6) { width: 22%; } /* Детали */
        th:nth-child(7), td:nth-child(7) { width: 10%; } /* Действие */
        
        .severity-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            text-align: center;
            width: 100%;
            box-sizing: border-box;
        }
        
        .severity-low {
            background: #10b98120;
            color: #10b981;
            border: 1px solid #10b981;
        }
        
        .severity-medium {
            background: #f59e0b20;
            color: #f59e0b;
            border: 1px solid #f59e0b;
        }
        
        .severity-high {
            background: #ef444420;
            color: #ef4444;
            border: 1px solid #ef4444;
        }
        
        .severity-critical {
            background: #7f1d1d;
            color: #fecaca;
            border: 1px solid #ef4444;
        }
        
        .timestamp {
            color: #94a3b8;
            font-size: 0.85rem;
        }
        
        .details {
            color: #94a3b8;
            font-size: 0.85rem;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }
        
        .page-btn {
            background: #1e293b;
            border: 1px solid #334155;
            color: #e2e8f0;
            width: 40px;
            height: 40px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        
        .page-btn:hover {
            background: #3b82f6;
        }
        
        .page-btn.active {
            background: #3b82f6;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #94a3b8;
        }
        
        .error {
            color: #ef4444;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛡️ DNS Firewall Monitor</h1>
        <div class="subtitle">Обнаружение DNS-туннелей и аномалий</div>
        
        <div class="stats-grid" id="stats">
            <div class="stat-card">
                <div class="stat-label">Всего запросов</div>
                <div class="stat-value" id="total-queries">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Всего алертов</div>
                <div class="stat-value" id="total-alerts">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Заблокировано IP</div>
                <div class="stat-value" id="blocked-ips">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Средняя энтропия</div>
                <div class="stat-value" id="avg-entropy">-</div>
            </div>
        </div>
        
        <div class="filters">
            <div class="filter-group">
                <label>Серьезность:</label>
                <select id="severity-filter">
                    <option value="all">Все</option>
                    <option value="low">Low</option>
                    <option value="medium">Medium</option>
                    <option value="high">High</option>
                    <option value="critical">Critical</option>
                </select>
            </div>
            
            <div class="filter-group">
                <label>Поиск по IP:</label>
                <input type="text" id="search-ip" placeholder="например: 127.0.0.1">
            </div>
            
            <button class="refresh-btn" onclick="loadData()">🔄 Обновить</button>
        </div>
        
        <table>
            <thead>
                <tr>
                    <th>Время</th>
                    <th>IP источника</th>
                    <th>Домен</th>
                    <th>Серьезность</th>
                    <th>Причина</th>
                    <th>Детали</th>
                    <th>Действие</th>
                </tr>
            </thead>
            <tbody id="alerts-table">
                <tr>
                    <td colspan="7" class="loading">Загрузка данных...</td>
                </tr>
            </tbody>
        </table>
        
        <div class="pagination" id="pagination">
            <!-- Пагинация будет добавляться через JS -->
        </div>
    </div>

    <script>
        let currentPage = 1;
        const itemsPerPage = 10;
        let allAlerts = [];
        
        async function loadData() {
            try {
                // Загружаем алерты
                const alertsResponse = await fetch('/api/alerts');
                allAlerts = await alertsResponse.json();
                
                // Загружаем статистику
                const statsResponse = await fetch('/api/dns/stats');
                const stats = await statsResponse.json();
                
                // Обновляем статистику
                document.getElementById('total-queries').textContent = stats.total_queries || 0;
                document.getElementById('total-alerts').textContent = stats.total_alerts || 0;
                document.getElementById('blocked-ips').textContent = stats.blocked_ip || 0;
                document.getElementById('avg-entropy').textContent = stats.avg_entropy?.toFixed(2) || '0';
                
                // Применяем фильтры и отображаем
                applyFilters();
                
            } catch (error) {
                console.error('Ошибка загрузки:', error);
                document.getElementById('alerts-table').innerHTML = 
                    `<tr><td colspan="7" class="error">❌ Ошибка загрузки данных</td></tr>`;
            }
        }
        
        function applyFilters() {
            const severityFilter = document.getElementById('severity-filter').value;
            const searchIP = document.getElementById('search-ip').value.toLowerCase();
            
            let filtered = allAlerts;
            
            // Фильтр по серьезности
            if (severityFilter !== 'all') {
                filtered = filtered.filter(a => a.severity === severityFilter);
            }
            
            // Фильтр по IP
            if (searchIP) {
                filtered = filtered.filter(a => a.source_ip.toLowerCase().includes(searchIP));
            }
            
            displayAlerts(filtered);
        }
        
        function displayAlerts(alerts) {
            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const pageAlerts = alerts.slice(start, end);
            
            if (pageAlerts.length === 0) {
                document.getElementById('alerts-table').innerHTML = 
                    `<tr><td colspan="7" class="loading">📭 Нет алертов</td></tr>`;
            } else {
                const html = pageAlerts.map(alert => `
                    <tr>
                        <td class="timestamp">${new Date(alert.timestamp).toLocaleString()}</td>
                        <td>${alert.source_ip}</td>
                        <td>${alert.domain}</td>
                        <td><span class="severity-badge severity-${alert.severity}">${alert.severity}</span></td>
                        <td>${alert.reason}</td>
                        <td class="details">${JSON.stringify(alert.details)}</td>
                        <td>${alert.action_taken}</td>
                    </tr>
                `).join('');
                
                document.getElementById('alerts-table').innerHTML = html;
            }
            
            // Обновляем пагинацию
            updatePagination(alerts.length);
        }
        
        function updatePagination(totalItems) {
            const totalPages = Math.ceil(totalItems / itemsPerPage);
            const pagination = document.getElementById('pagination');
            
            if (totalPages <= 1) {
                pagination.innerHTML = '';
                return;
            }
            
            let html = '';
            for (let i = 1; i <= totalPages; i++) {
                html += `<div class="page-btn ${i === currentPage ? 'active' : ''}" 
                              onclick="goToPage(${i})">${i}</div>`;
            }
            
            pagination.innerHTML = html;
        }
        
        function goToPage(page) {
            currentPage = page;
            applyFilters();
        }
        
        // Добавляем обработчики фильтров
        document.getElementById('severity-filter').addEventListener('change', () => {
            currentPage = 1;
            applyFilters();
        });
        
        document.getElementById('search-ip').addEventListener('input', () => {
            currentPage = 1;
            applyFilters();
        });
        
        // Загружаем данные при загрузке страницы
        loadData();
        
        // Автообновление каждые 5 секунд
        setInterval(loadData, 5000);
    </script>
</body>
</html>
